name: Build K-FancyZones

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get version
        id: ver
        shell: bash
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/KrisZone/KrisZone.csproj || echo "1.0.1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build
        run: dotnet publish src/KrisZone/KrisZone.csproj -c Release -r win-x64 --no-self-contained -o publish /p:PublishSingleFile=true /p:DebugType=None /p:DebugSymbols=false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: K-FancyZones-${{ steps.ver.outputs.version }}
          path: publish/K-FancyZones.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: K-FancyZones v${{ steps.ver.outputs.version }}
          files: publish/K-FancyZones.exe
          body: |
            K-FancyZones v${{ steps.ver.outputs.version }}
            - 트레이 우클릭 → 프로그램 정보 기능 추가
            - Windows 10/11 x64 | .NET 8 Runtime 필요
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
